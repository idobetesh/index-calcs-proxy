name: Deploy Apps Script

on:
  push:
    branches: [master]
    paths:
      - 'gs/src/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Set up clasp credentials
        run: echo '${{ secrets.CLASP_RC }}' > ~/.clasprc.json

      - name: Set up .clasp.json
        run: |
          echo '{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"src"}' > gs/.clasp.json

      - name: Push to Apps Script
        run: cd gs && clasp push --force
